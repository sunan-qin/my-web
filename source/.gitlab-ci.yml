# GitLab CI/CD configuration for Pages deployment
# This job will publish the Sphinx-generated HTML as a static website

pages:
  stage: deploy
  script:
    - mkdir .public
    - cp -r build/html/* .public
    - rm -rf public
    - mv .public public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
